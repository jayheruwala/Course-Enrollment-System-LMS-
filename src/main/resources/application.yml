server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/lms
    username: lms_user
    password: lms_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: averylongsecretkeythatneedstobeatleast256bitslongforhmacsha256signing1234567890
  expiration: 3600000 # 1 hour in ms
  refreshExpiration: 604800000 # 7 days in ms
